<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2doc — Legal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #1A1A1A;
      --ink2:     #3A3A3A;
      --mute:     #6B6B6B;
      --faint:    #9A9A9A;
      --hair:     #E5E5E5;
      --outline:  #D0D0D0;
      --surface:  #FFFFFF;
      --bg:       #FAFAFA;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: var(--mute);
      margin-bottom: 48px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 16px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--outline);
      border: 1px solid var(--outline);
      border-radius: 12px;
      overflow: hidden;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: var(--surface);
      text-decoration: none;
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      transition: background 0.12s;
    }

    .links a:hover { background: var(--bg); }

    .links a .arrow {
      color: var(--faint);
      font-size: 18px;
      line-height: 1;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--faint);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">2doc</div>
    <div class="tagline">Document everything, privately.</div>

    <h1>Legal</h1>

    <div class="links">
      <a href="privacy/">
        <span>Privacy Policy</span>
        <span class="arrow">›</span>
      </a>
      <a href="terms/">
        <span>Terms &amp; Conditions</span>
        <span class="arrow">›</span>
      </a>
    </div>

    <footer>Legal documents for 2doc.</footer>
  </div>
</body>
</html>
